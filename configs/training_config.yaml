# ============================================================
# Qwen3-14B 감성분석 QLoRA 파인튜닝 설정
# ============================================================
# 이 파일 하나로 모든 학습 파라미터를 관리합니다.
# 값을 바꿔가며 실험할 때 코드 수정 없이 이 파일만 수정하면 됩니다.
# ============================================================

model:
  name: "Qwen/Qwen3-14B"
  # max_seq_length: 프롬프트(system+user) + 모델 응답(assistant)을 합친 최대 토큰 수
  # - 너무 짧으면 데이터가 잘리고, 너무 길면 GPU 메모리를 낭비
  # - 우리 데이터는 리뷰 텍스트가 짧고 JSON 출력도 짧아서 512면 충분
  max_seq_length: 512

# ============================================================
# 양자화 (Quantization) 설정
# ============================================================
# 14B 모델을 그대로 로드하면 ~28GB (FP16 기준) 필요
# 4bit 양자화를 쓰면 ~8GB로 줄어들어 A100 한 장에서 학습 가능
quantization:
  load_in_4bit: true          # 모델 가중치를 4bit로 압축하여 로드
  bnb_4bit_quant_type: "nf4"  # NormalFloat4: 정규분포 기반 양자화, FP4보다 정확도 높음
  bnb_4bit_compute_dtype: "bfloat16"  # 연산은 bfloat16으로 수행 (4bit는 저장용, 계산 시 복원)
  bnb_4bit_use_double_quant: true     # 양자화 상수도 다시 양자화 → 메모리 추가 절약 (~0.4GB)

# ============================================================
# LoRA (Low-Rank Adaptation) 설정
# ============================================================
# 전체 14B 파라미터를 학습하면 메모리/시간 폭발 → LoRA로 일부만 학습
# 원리: 기존 가중치 W는 동결하고, 작은 행렬 A*B (rank r)만 학습
#        W_new = W_frozen + (alpha/r) * A * B
lora:
  r: 16                # rank: 학습되는 저차원 행렬의 크기
                       # - 높을수록 표현력 ↑ but 학습 파라미터 ↑
                       # - 보통 8~64, 소규모 데이터(150건)에는 16이 적당
                       # - r=8이면 파라미터 너무 적어 학습 부족, r=64이면 과적합 위험
  lora_alpha: 32       # 스케일링 팩터: 실제 적용되는 스케일 = alpha / r = 32/16 = 2.0
                       # - 보통 r의 2배로 설정하는 것이 관례
                       # - 값이 크면 LoRA 영향력 ↑, 작으면 원래 모델에 가까움
  lora_dropout: 0.1    # LoRA 레이어에 적용되는 드롭아웃 (과적합 방지)
                       # - 데이터가 150건으로 매우 적어서 강하게 설정
                       # - 0.05에서 과적합 징후 확인되어 0.1로 상향
  target_modules:      # LoRA를 적용할 레이어 선택
    - q_proj            # Query: "이 토큰이 어떤 정보를 찾고 있는지"
    - k_proj            # Key: "이 토큰이 어떤 정보를 제공하는지"
    - v_proj            # Value: "실제로 전달할 정보"
    - o_proj            # Output: Attention 결과를 합치는 레이어
    - gate_proj         # MLP Gate: 정보 흐름을 제어하는 게이트
    - up_proj           # MLP Up: 차원을 확장하여 비선형 변환
    - down_proj         # MLP Down: 확장된 차원을 다시 축소
                       # → Attention(문맥 이해) + MLP(판단/분류) 모두 학습
                       # → 감성 "판단"은 MLP에서 일어나므로 분류 성능 향상 기대
  bias: "none"         # bias 파라미터는 학습하지 않음 (메모리 절약)
  task_type: "CAUSAL_LM"  # 인과적 언어모델 (다음 토큰 예측) 방식

# ============================================================
# 학습 하이퍼파라미터
# ============================================================
training:
  num_train_epochs: 4          # 전체 데이터를 4번 반복 학습
                               # - v1(5에폭): 과적합, v2(3에폭): 학습 부족
                               # - 4에폭으로 정확도와 토픽 추출 균형점 탐색
  per_device_train_batch_size: 4   # GPU 1장당 한번에 처리하는 샘플 수
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2   # 2번의 미니배치를 모아서 1번 업데이트
                                   # → 실효 배치 사이즈 = 4 x 2 = 8
                                   # → 에폭당 스텝 수: 120/8 = 15스텝 (기존 7.5스텝에서 2배)
                                   # → 더 세밀한 가중치 업데이트 가능
  learning_rate: 2.0e-4        # 0.0002 — QLoRA 파인튜닝의 표준 학습률
                               # - Full fine-tuning은 보통 1e-5~5e-5
                               # - LoRA는 파라미터가 적어서 더 높은 lr 사용 가능
                               # - 너무 높으면 발산, 너무 낮으면 수렴 느림
  lr_scheduler_type: "cosine"  # 학습률 스케줄러: cosine 감소
                               # - 학습 초반: warmup으로 lr 올림
                               # - 학습 중반~후반: 코사인 곡선으로 서서히 lr 감소
                               # - linear보다 후반부 미세 조정에 유리
  warmup_ratio: 0.05           # 전체 스텝의 5%만큼 워밍업
                               # - 학습 초기에 lr을 0에서 서서히 올림
                               # - 갑자기 높은 lr을 쓰면 학습 초반에 불안정
                               # - train 120건 / 배치16 = ~8스텝/에폭, 5에폭 = ~40스텝
                               #   → warmup은 약 2스텝 정도
  optim: "paged_adamw_8bit"    # 8bit AdamW 옵티마이저
                               # - 일반 AdamW는 모델 크기의 2배 메모리 사용 (momentum + variance)
                               # - 8bit 버전은 이를 대폭 줄여줌
                               # - "paged"는 GPU 메모리 부족 시 CPU로 자동 스왑
  fp16: false                  # FP16 사용 안 함
  bf16: true                   # BFloat16 사용 (A100 이상에서 지원)
                               # - fp16보다 수치 범위가 넓어서 오버플로우 적음
                               # - A100/H100에서는 bf16이 표준
                               # - V100 등 구형 GPU에서는 fp16: true, bf16: false로 변경
  logging_steps: 5             # 5 스텝마다 WandB에 loss 기록
  eval_strategy: "epoch"       # 에폭 끝날 때마다 validation 평가
  save_strategy: "epoch"       # 에폭 끝날 때마다 체크포인트 저장
  load_best_model_at_end: true     # 학습 종료 후 val_loss가 가장 낮은 체크포인트 자동 로드
  metric_for_best_model: "eval_loss"  # 최적 모델 기준 = validation loss
  greater_is_better: false     # loss는 낮을수록 좋으므로 false
  report_to: "wandb"           # WandB로 실시간 모니터링

# ============================================================
# 데이터 설정
# ============================================================
data:
  dataset_name: "Younggooo/senti_data2"  # HuggingFace에서 자동 다운로드
  train_ratio: 0.8   # 80%=120건 학습, 20%=30건 검증
  seed: 42           # 데이터 분할 시드 (재현성 보장)

# ============================================================
# WandB 실험 추적
# ============================================================
# WandB 대시보드에서 실시간으로 loss 그래프, lr 변화, GPU 사용량 확인 가능
wandb:
  project: "senti-fine-tuning"           # WandB 프로젝트명 (대시보드 그룹)
  run_name: "qwen3-14b-qlora-senti"      # 이번 실험 이름 (파라미터 바꿀 때마다 변경 추천)

# ============================================================
# 출력 경로
# ============================================================
output:
  output_dir: "./outputs"          # 학습 체크포인트 저장 디렉토리
  adapter_dir: "./outputs/adapter" # 최종 LoRA 어댑터 저장 경로
                                   # - 전체 모델(~28GB)이 아닌 어댑터(~수십MB)만 저장
                                   # - 추론 시 base 모델 + 이 어댑터를 합쳐서 사용

# ============================================================
# 추론 설정
# ============================================================
inference:
  temperature: 0.1     # 생성 다양성 조절 (0에 가까울수록 결정적)
                       # - 0.1: 거의 항상 같은 답 → JSON 출력 일관성 확보
                       # - 1.0: 다양한 답 → 창작에 적합하지만 분석에는 부적합
                       # - 0.0으로 하면 do_sample=False와 동일 (greedy)
  max_new_tokens: 128  # 모델이 생성하는 최대 토큰 수
                       # - JSON 출력은 보통 50~80토큰이므로 128이면 충분
                       # - 너무 크면 불필요한 텍스트가 이어서 나올 수 있음
